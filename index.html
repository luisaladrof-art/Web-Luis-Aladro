<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        #chatbox { width: 300px; height: 400px; border: 1px solid #ccc; padding: 10px; }
        #user-input { width: calc(100% - 20px); }
    </style>
</head>
<body>
    <h1>Chatbot Widget</h1>
    <div id="chatbox"></div>
    <input type="text" id="user-input" placeholder="Type your message..."/>
    <button id="send-button">Send</button>

    <script>
        $(document).ready(function() {
            $('#send-button').click(function() {
                var userInput = $('#user-input').val();
                $('#chatbox').append('<div>User: ' + userInput + '</div>');

                // Simulating chatbot response
                setTimeout(function() {
                    $('#chatbox').append('<div>Chatbot: This is a simulated response.</div>');
                }, 1000);

                $('#user-input').val('');
            });
        });
    </script>
</body>
</html>
